{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: tiny.rules
      rules:
        - alert: TinyDown
          expr: up{namespace="{{ .Release.Namespace }}", service="{{ .Chart.Name }}"} == 0
          for: 2m
          labels:
            severity: warning
            service: tiny
          annotations:
            summary: "Tiny service is down"
            description: "Prometheus cannot scrape Tiny in namespace {{ .Release.Namespace }}."

        - alert: TinyPodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", container="tiny"}[10m]) > 0
          for: 1m
          labels:
            severity: warning
            service: tiny
          annotations:
            summary: "Tiny pod is restarting"
            description: "Tiny container restarted in the last 10 minutes."
{{- end }}
